name             = App-Martha
author           = Brett Estrade <oodler@cpan.org>
license          = Perl_5
copyright_holder = Brett Estrade
copyright_year   = 2026
version          = 0.001

[GatherDir]
[PruneCruft]
[ManifestSkip]

[ExecDir]
dir = bin

; Detect normal Perl dependencies, but deliberately do not advertise Wx as a
; CPAN prerequisite.  Martha needs an already-working wxPerl environment and
; must fail rather than asking a CPAN client to install Wx automatically.
[AutoPrereqs]
skip = ^Wx(?:$|::)

; Inject configure-time environment checks into the generated Makefile.PL.
; MakeMaker::Awesome replaces the ordinary [MakeMaker] plugin.
[MakeMaker::Awesome]
delimiter = |
header = |die "Martha is supported only on native Windows Perl (MSWin32).\n"
header = |    unless $^O eq 'MSWin32';
header = |
header = |eval { require Wx; Wx->VERSION; 1 }
header = |    or die "Martha requires a working wxPerl (Wx) installation.\n"
header = |         . "Install wxPerl separately before installing Martha; "
header = |         . "automatic Wx installation is intentionally disabled.\n\n"
header = |         . $@;

[MetaYAML]
[MetaJSON]
[License]
[Manifest]
[TestRelease]
[ConfirmRelease]
[UploadToCPAN]

